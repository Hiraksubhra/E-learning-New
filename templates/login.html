{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | E-Learning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f7fa; /* Default light gray bg */
            font-family: 'Poppins', sans-serif;
        }

        .split-container {
            display: flex;
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            max-height: 700px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(50,50,93,.1), 0 5px 15px rgba(0,0,0,.07);
        }

        .split-left {
            flex: 1;
            background-color: #f8fafd;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            border-right: 1px solid #eee;
        }

        .left-logo {
            align-self: flex-start;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--bg-navy);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: auto; 
        }
        .left-logo i { color: var(--primary-orange); }

        .welcome-text { margin-top: auto; margin-bottom: auto; }
        .welcome-text h1 { font-size: 2.2rem; color: var(--text-dark); margin-bottom: 10px; }
        .welcome-text p { color: #666; font-size: 1rem; line-height: 1.6; max-width: 400px; }

        .split-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: none; 
            box-shadow: none;
            padding: 0;
            display: block; 
        }

        .login-card h2 {
            text-align: left;
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .login-card p.subtitle {
            text-align: left;
            color: #777;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-dark);
        }
       
        .input-group input {
            width: 100%;
            box-sizing: border-box;
        }
        .password-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .password-container label { margin-bottom: 0; }
        
        .forgot-pass {
            font-size: 0.85rem;
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 500;
        }
        .btn-orange {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .auth-links {
            margin-top: 30px;
            text-align: left;
            font-size: 0.9rem;
            color: #666;
        }
        .auth-links a.signup-link {
            color: var(--primary-orange);
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }
        
        .go-home-link {
            display: block;
            margin-top: 20px;
            color: #999;
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        @media (max-width: 768px) {
            .split-container { flex-direction: column; height: auto; max-height: none;}
            .split-left { border-right: none; border-bottom: 1px solid #eee; padding: 30px;}
            .left-logo { margin-bottom: 20px;}
            .split-right { padding: 30px;}
        }
    </style>
</head>
<body>

    <div class="split-container">
        
        <div class="split-left">
            <div class="left-logo">
                <i class="fas fa-pen-nib"></i> e-learning
            </div>
            
                <img src="{% static 'img/learning.svg' %}" alt="Learning Illustration" style="width: 100%; max-width: 350px; height: auto; margin: 30px 0;">
            
            <div class="welcome-text">
                <h1>Welcome to our Platform</h1>
                <p>Start your journey with us. Access tailored courses and dynamic AI quizzes to accelerate your learning.</p>
            </div>
        </div>
        
        <div class="split-right">
            <div class="login-card"> 
                <h2>Sign In</h2>
                <p class="subtitle">Enter your details to access your account</p>

                <form action="{% url 'login_req' %}" method="POST" autocomplete="off">
                    {% csrf_token %}
                    <div class="input-group">
                        <label for="username">Email or Username</label>
                        <input type="text" id="username" name="username" placeholder="name@company.com" required>
                    </div>

                    <div class="input-group">
                        <div class="password-container">
                            <label for="password">Password</label>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-orange">Sign In</button>
                </form>

                <div class="auth-links">
                    <span>Don't have an account?</span> 
                    <a href="{% url 'register_page' %}" class="signup-link">Sign Up</a>
                    
                    <a href="{% url 'index' %}" class="go-home-link">
                        <i class="fas fa-arrow-left"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
